<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="container mx-auto px-4 py-8">

        <!-- Header -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h1 class="text-3xl font-bold text-center text-gray-800">
                Todo Dashboard
            </h1>
            <p class="text-center text-gray-600 mt-2">
                Manage your tasks efficiently
            </p>
        </div>

        <!-- Add Todo Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Add New Todo</h2>

            <form th:action="@{/add}" method="post" class="flex gap-4">

                <input type="text" name="data" placeholder="Enter your todo..."
                    class="flex-1 py-3 px-4 rounded-lg outline-none border-2 border-gray-300 focus:border-blue-500 transition-colors"
                    required />

                <button type="submit"
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold">
                    Add Todo
                </button>

            </form>
        </div>

        <!-- Todo List -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Your Todos</h2>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(todos)}" class="text-center py-8 text-gray-500">
                No todos yet.
            </div>

            <!-- Todo Grid -->
            <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">

                <div th:each="todo, stat : ${todos}"
                    class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-lg transition-shadow">

                    <!-- Top -->
                    <div class="flex justify-between items-start mb-3">

                        <span class="text-xs font-semibold text-blue-600 bg-blue-100 px-2 py-1 rounded">
                            ID:
                            <span th:text="${todo.id}"></span>
                        </span>

                        <span class="text-sm text-gray-500" th:text="${stat.count}">
                        </span>

                    </div>

                    <!-- Todo Text -->
                    <p class="text-gray-800 font-medium mb-3" th:text="${todo.data}">
                    </p>

                    <!-- Dates -->
                    <div class="text-xs text-gray-500 space-y-1">

                        <div class="flex justify-between">
                            <span>Created:</span>
                            <span th:text="${#temporals.format(todo.createdAt, 'dd MMM yyyy')}"></span>
                        </div>

                        <div class="flex justify-between">
                            <span>Updated:</span>
                            <span th:text="${#temporals.format(todo.updatedAt, 'dd MMM yyyy')}"></span>
                        </div>

                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-2 mt-4">

                        <!-- Delete -->
                        <form th:action="@{/delete/{id}(id=${todo.id})}" method="post" class="flex-1">

                            <button type="submit" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700">
                                Delete
                            </button>

                        </form>

                        <!-- Edit -->
                        <a th:href="@{/edit/{id}(id=${todo.id})}"
                            class="flex-1 text-center bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">
                            Edit
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
