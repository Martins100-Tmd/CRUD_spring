<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World!</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="w-1/2 mx-auto rounded shadow p-3 grid grid-cols-1 gap-1">
        <div th:each="todo : ${todos}" class="flex flex-row items-center w-full justify-between p-2 shadow">
            <p th:text="${todo.data}"></p>
            <i class="text-xl text-end font-800 text-red-700">x</i>
        </div>
    </div>
</body>

</html>
